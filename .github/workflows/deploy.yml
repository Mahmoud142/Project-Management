name: Deploy Project-Management API to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Connected to AWS EC2!"
            cd ~/Project-Management
            git pull origin main
            sudo docker-compose up -d --build --scale api-server=3
            echo "Deployment Successful! The Maestro is running!"
